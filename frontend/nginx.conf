# Nginx config for the SPA + API proxy.
#
# Two non-obvious bits worth flagging:
#   1. /api/notifications/stream is SSE — buffering MUST be disabled or the
#      browser receives nothing until the connection drops.
#   2. SPA fallback: any unknown path serves index.html so React Router can
#      handle deep links like /questions/42.

upstream backend {
  server backend:3000;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed bundles, never cache index.html.
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SSE: switch to HTTP/1.1, kill all buffering, allow long-lived connections.
  location = /api/notifications/stream {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
    chunked_transfer_encoding off;
    proxy_pass http://backend;
  }

  # Regular API.
  location /api/ {
    # Allow image uploads up to match the backend's 5MB cap (default is 1MB
    # and would reject uploads before they reach multer).
    client_max_body_size 6m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend;
  }

  # User uploads served from backend disk. Same-origin path so no CORS and
  # cookies (for auth) tag along naturally.
  location /uploads/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
