name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

# Cancel in-flight runs on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (tsc + jest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Jest (SQLite in-memory, NODE_ENV=test)
        run: npm test -- --ci --reporters=default

  frontend:
    name: Frontend (tsc + vite build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc -b && vite build)
        run: npm run build

  e2e:
    name: E2E (Playwright + Chromium)
    runs-on: ubuntu-latest
    # Don't burn browser-download minutes when basic checks already failed.
    needs: [backend, frontend]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install e2e deps
        run: npm ci
        working-directory: e2e

      # Cache the ~150 MB Chromium download keyed on Playwright's lockfile so
      # browser version bumps cleanly invalidate the cache.
      - name: Cache Playwright browsers
        id: pwcache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright browsers (cold)
        if: steps.pwcache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium chromium-headless-shell
        working-directory: e2e

      # Cached browser binaries don't include the apt system libs they need.
      - name: Install Playwright system deps (cached)
        if: steps.pwcache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium chromium-headless-shell
        working-directory: e2e

      - name: Run E2E suite
        run: npm test
        working-directory: e2e
        env:
          CI: 'true'

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Upload failure traces / videos / screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failures
          path: e2e/test-results/
          retention-days: 7
